# QED — proof engine · Fly.io config
# Deploy: fly launch --copy-config --no-deploy && fly volumes create qed_data --size 1 && fly deploy
app = "qed-proof-engine"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  ENABLE_SCHEDULER = "1"
  PORT = "3000"

[[mounts]]
  source = "qed_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Bots must trade 24/7 — never scale to zero
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
