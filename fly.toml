# fly.toml app configuration file generated for qed-proof-engine on 2026-06-10T12:23:22+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'qed-proof-engine'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENABLE_SCHEDULER = '1'
  PORT = '3000'

[[mounts]]
  source = 'qed_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
