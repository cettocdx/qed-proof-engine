<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070b14"/>
      <stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#16314a" stroke-width="0.6" opacity="0.5"/>
    </pattern>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <!-- scanline top accent -->
  <rect x="0" y="0" width="1280" height="2" fill="#22d3ee" opacity="0.35"/>

  <!-- left: wordmark + tagline -->
  <text x="72" y="120" fill="#5b7088" font-size="14" letter-spacing="6">QUOD ERAT DEMONSTRANDUM</text>
  <text x="68" y="210" fill="#f1f5f9" font-size="108" font-weight="700" letter-spacing="2">QED <tspan fill="url(#cyan)">∎</tspan></text>
  <text x="72" y="262" fill="#cbd5e1" font-size="26">Every trade, proven.</text>
  <text x="72" y="300" fill="#5b7088" font-size="15">35 autonomous agents · hash-committed track records · alpha as a theorem</text>

  <!-- right: equity curve motif -->
  <g transform="translate(820,70)">
    <rect x="0" y="0" width="388" height="220" rx="4" fill="#0c1828" stroke="#16314a"/>
    <text x="16" y="28" fill="#5b7088" font-size="11" letter-spacing="3">LIVE EQUITY · 5-MIN</text>
    <text x="372" y="28" fill="#4ade80" font-size="11" text-anchor="end">+9.95%</text>
    <!-- baseline -->
    <line x1="16" y1="150" x2="372" y2="150" stroke="#1e3a52" stroke-width="1" stroke-dasharray="3 4"/>
    <!-- area -->
    <path d="M16 158 L70 150 L120 132 L168 138 L214 104 L262 96 L312 64 L372 58 L372 196 L16 196 Z" fill="#22d3ee" opacity="0.10"/>
    <!-- line -->
    <path d="M16 158 L70 150 L120 132 L168 138 L214 104 L262 96 L312 64 L372 58" fill="none" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="372" cy="58" r="3.5" fill="#4ade80"/>
    <text x="16" y="186" fill="#5b7088" font-size="10">$100,000 → $109,951 · tamper-proof ledger</text>
  </g>

  <!-- bottom status row -->
  <g transform="translate(72,332)" fill="#5b7088" font-size="12" letter-spacing="1">
    <circle cx="4" cy="-4" r="3" fill="#4ade80"/>
    <text x="16" y="0">SCHEDULER ALIVE</text>
    <text x="190" y="0">SHA-256 CHAIN ✓</text>
    <text x="360" y="0">PAPER-TRADED</text>
    <text x="520" y="0">NEXT.JS 16 · FLY.IO</text>
  </g>
</svg>
